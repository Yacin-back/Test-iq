<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Mastery: Final Forensic Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f8fafc; --accent: #fbbf24; --danger: #f43f5e; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        .hidden { display: none !important; }
        input { background: #334155; border: 2px solid #475569; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; outline: none; }
        button { background: var(--primary); border: none; color: #0f172a; padding: 14px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; margin-bottom: 8px; transition: 0.2s; font-size: 0.9rem; }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .case-box { background: rgba(15, 23, 42, 0.6); padding: 20px; border-radius: 16px; text-align: left; border-left: 4px solid var(--primary); margin-bottom: 20px; position: relative; min-height: 100px; }
        .feedback-label { position: absolute; top: 10px; right: 10px; font-weight: bold; font-size: 0.7rem; padding: 5px 12px; border-radius: 20px; text-transform: uppercase; color: white; }
        .correct-glow { background: var(--success); box-shadow: 0 0 15px var(--success); }
        .wrong-glow { background: var(--danger); box-shadow: 0 0 15px var(--danger); }
        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; background: #0f172a; border-radius: 10px; overflow: hidden; }
        .ranking-table td, .ranking-table th { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        .progress-bar { height: 6px; background: #334155; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        footer { margin-top: 25px; font-size: 0.7rem; color: #64748b; border-top: 1px solid #334155; padding-top: 15px; }
    </style>
</head>
<body>

<audio id="bg-music" loop><source src="SpotiDown.App - double take - Dhruv.mp3" type="audio/mpeg"></audio>
<audio id="sfx-correct"><source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg"></audio>
<audio id="sfx-wrong"><source src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" type="audio/mpeg"></audio>

<div class="container">
    <div id="setup">
        <h1 style="color:var(--primary)">Criminal IQ Test</h1>
        <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 20px;">Sistem Analisis Forensik | Max Poin: 1000</p>
        <input type="text" id="username" placeholder="Nama Agen...">
        <button onclick="checkAndStart()">MULAI TEST</button>
        <div id="admin-login" class="hidden" style="margin-top: 15px; border-top: 1px solid #444; padding-top: 15px;">
            <input type="password" id="adminCode" placeholder="Kode Rahasia...">
            <button style="background:var(--accent)" onclick="accessAdmin()">LOGIN ADMIN</button>
        </div>
        <button class="btn-outline" onclick="toggleRanking()">RANKING GLOBAL</button>
        <button style="background:transparent; color:#475569; font-size:0.7rem;" onclick="document.getElementById('admin-login').classList.toggle('hidden')">Akses Admin</button>
        <div id="ranking-list" class="hidden"><table class="ranking-table"><thead><tr><th>#</th><th>Agen</th><th>Skor</th></tr></thead><tbody id="ranking-body"></tbody></table></div>
    </div>

    <div id="quiz" class="hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.75rem; font-weight:bold;">
            <span id="q-count"></span>
            <span style="color:var(--accent)">Skor: <span id="live-score">0</span></span>
        </div>
        <div class="case-box">
            <div id="feedback-ui" class="feedback-label hidden"></div>
            <div id="question-text"></div>
        </div>
        <div id="options-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <div id="result" class="hidden">
        <h1>Investigasi Selesai</h1>
        <div style="font-size: 4.5rem; font-weight: 800; color: var(--primary);" id="score-display">0</div>
        <p id="motivation" style="font-style: italic; font-size: 0.9rem; color: #cbd5e1;"></p>
        <button class="btn-outline" onclick="location.reload()">KE MENU UTAMA</button>
        <footer>Developed by <b>Yacin</b></footer>
    </div>
</div>

<script>
    const questions = [
        { q: "Kakek ditabrak lari hari Minggu. Dia tulis '101112'. Tersangka: Andi, Budi (Lahir Okt-Des), Soni, Dani. Siapa pelakunya?", a: ["Andi", "Budi", "Soni", "Dani"], c: 1 },
        { q: "Urutan bulan: J, F, M, A, M, J, ...?", a: ["J (Juli)", "A (Agustus)", "S", "O"], c: 0 },
        { q: "Lampu mati, Tersangka A mengaku sedang baca buku. Kenapa dia bohong?", a: ["Buku berat", "Butuh cahaya", "Dia tidur", "Dia buta"], c: 1 }
    ];
    for(let i=4; i<=35; i++) {
        questions.push({ q: `Kasus Forensik #${i}: Analisis DNA menunjukkan kecocokan 99%. Jika tersangka adalah saudara kembar identik, apakah DNA mereka berbeda?`, a: ["Ya", "Tidak", "Hanya Sedikit", "Tergantung Umur"], c: 1 });
    }

    let currentIdx = 0, score = 0, currentUser = "";

    function accessAdmin() {
        if(document.getElementById('adminCode').value === '6723') {
            saveScore("Admin Yacin", 1000);
            alert("Skor Admin Berhasil Diset!");
            location.reload();
        } else { alert("Kode Salah!"); }
    }

    function checkAndStart() {
        const name = document.getElementById('username').value.trim();
        if(!name || name.toLowerCase() === "admin") return alert("Nama tidak valid!");
        let db = JSON.parse(localStorage.getItem('iq_db_v3')) || [];
        if(db.some(u => u.name.toLowerCase() === name.toLowerCase())) return alert("Nama sudah ada!");

        currentUser = name;
        document.getElementById('bg-music').play().catch(()=>{});
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('progress-fill').style.width = (currentIdx/35)*100 + "%";
        document.getElementById('q-count').innerText = `KASUS ${currentIdx+1} / 35`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "btn-outline"; btn.innerText = opt;
            btn.onclick = () => handleAnswer(i, q.c);
            container.appendChild(btn);
        });
    }

    function handleAnswer(selected, correct) {
        const fb = document.getElementById('feedback-ui');
        const btns = document.querySelectorAll('#options-container button');
        btns.forEach(b => b.disabled = true); // FIX: Kunci tombol agar tidak bug klik ganda

        fb.classList.remove('hidden', 'correct-glow', 'wrong-glow');
        if(selected === correct) {
            score += (1000 / 35);
            fb.innerText = "BENAR";
            fb.classList.add('correct-glow');
            document.getElementById('sfx-correct').play();
        } else {
            fb.innerText = "SALAH";
            fb.classList.add('wrong-glow');
            document.getElementById('sfx-wrong').play();
        }
        
        document.getElementById('live-score').innerText = Math.floor(score); // FIX: Skor dibulatkan ke bawah

        setTimeout(() => {
            fb.classList.add('hidden');
            currentIdx++;
            if(currentIdx < questions.length) showQuestion(); else finish();
        }, 800);
    }

    function finish() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        let final = Math.round(score);
        document.getElementById('score-display').innerText = final;
        document.getElementById('motivation').innerText = `Agen ${currentUser}, investigasi selesai dengan hasil memuaskan.`;
        saveScore(currentUser, final);
    }

    function saveScore(name, val) {
        let db = JSON.parse(localStorage.getItem('iq_db_v3')) || [];
        db = db.filter(u => u.name.toLowerCase() !== name.toLowerCase());
        db.push({ name: name, score: val, timestamp: new Date().getTime() });
        db.sort((a, b) => b.score - a.score);
        localStorage.setItem('iq_db_v3', JSON.stringify(db));
    }

    function toggleRanking() {
        const list = document.getElementById('ranking-list');
        list.classList.toggle('hidden');
        const db = JSON.parse(localStorage.getItem('iq_db_v3')) || [];
        const body = document.getElementById('ranking-body');
        body.innerHTML = db.map((u, i) => `<tr><td>${i+1}</td><td>${u.name}</td><td>${u.score}</td></tr>`).join('');
    }
</script>
</body>
</html>
