<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite IQ v3.3: Final Global Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-body: #131314; --bg-card: #1e1f20; --bg-input: #131314;
            --text-main: #e3e3e3; --text-sub: #9e9e9e; --primary: #a8cdff; 
            --border: #3c4043; --success: #34d399; --danger: #f87171; --shadow: rgba(0,0,0,0.5);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--bg-card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 500px; background: var(--bg-card); padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px var(--shadow); text-align: center; border: 1px solid var(--border); }
        .hidden { display: none !important; }
        input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        button { background: var(--primary); border: none; color: #0b0f1a; padding: 15px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .progress-bar { height: 6px; background: var(--border); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        #options button { text-align: left; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); }
        .correct-glow { background: var(--success) !important; color: white !important; }
        .wrong-glow { background: var(--danger) !important; color: white !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td, th { padding: 12px 5px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight:800; color:var(--primary);">ELITE IQ GLOBAL</div>
    <button style="width:auto; padding:5px 15px; font-size:0.7rem;" onclick="toggleRanking()">🏆 RANKING</button>
</div>

<div class="container">
    <div id="setup" class="card">
        <h2>Otoritas Agen</h2>
        <div id="welcome-user" class="hidden">
            <h3 id="logged-name" style="color:var(--primary)"></h3>
            <button onclick="startQuiz()">MULAI ANALISIS</button>
        </div>
        <div id="new-user">
            <input type="text" id="username" placeholder="Masukkan Nama Kode Agen...">
            <button onclick="checkAndRegister()">DAFTAR AGEN</button>
        </div>
    </div>

    <div id="quiz" class="card hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div id="q-count" style="font-size:0.75rem; margin-bottom:10px;"></div>
        <div style="background:var(--bg-input); padding:20px; border-radius:15px; text-align:left; margin-bottom:20px;" id="question-text"></div>
        <div id="options" style="display:grid; gap:10px;"></div>
    </div>

    <div id="ranking" class="card hidden">
        <h2>Ranking Global</h2>
        <table><tbody id="rank-body"></tbody></table>
        <button style="margin-top:20px;" onclick="showPage('setup')">Kembali</button>
    </div>

    <div id="result" class="card hidden">
        <h2>Investigasi Selesai</h2>
        <div style="font-size:4rem; font-weight:800; color:var(--primary);" id="score-display">0</div>
        <p id="msg"></p>
        <p id="cloud-status" style="font-size:0.7rem; color:var(--success);"></p>
        <button onclick="location.reload()">MAIN LAGI</button>
    </div>
</div>

<script>
    const BIN_ID = "69c4957daa77b81da91dbc5b"; 
    const API_KEY = "$2a$10$B8fhV5n7IkR2au5rrUG1QeGxPZkLVngsNZRDWpw9x2mzDXeRCgyDG";
    const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const questions = [
        { q: "Kasus CEO: Tewas di ruang kerja, pesan kalender berdarah: 7, 10, 11. Tersangka: Jason, Mike, Kevin, Ryan.", a: ["Jason", "Mike", "Kevin", "Ryan"], c: 0 },
        { q: "Logika Rantai: Jika 1=5, 2=15, 3=215, 4=3215, maka 5 sama dengan?", a: ["43215", "1", "5", "555"], c: 2 },
        { q: "Sandi Digital TKP: '3 21 16 1'. Jika dikonversi ke alfabet, menunjuk nama?", a: ["B-A-N-G", "C-U-P-A", "D-U-M-B", "C-A-P-A"], c: 1 }
        // ... pertanyaan lain bisa ditambah di sini ...
    ];

    let currentIdx = 0, score = 0, currentUser = "";

    window.onload = () => {
        const saved = localStorage.getItem('agent_v33');
        if(saved) {
            currentUser = saved;
            document.getElementById('logged-name').innerText = "Agen: " + currentUser;
            document.getElementById('welcome-user').classList.remove('hidden');
            document.getElementById('new-user').classList.add('hidden');
        }
    };

    function showPage(id) {
        ['setup', 'quiz', 'result', 'ranking'].forEach(p => document.getElementById(p).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function checkAndRegister() {
        const name = document.getElementById('username').value.trim();
        if(name.length < 3) return alert("Nama minimal 3 huruf!");
        currentUser = name;
        localStorage.setItem('agent_v33', name);
        startQuiz();
    }

    function startQuiz() { currentIdx = 0; score = 0; showPage('quiz'); showQuestion(); }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('progress-fill').style.width = ((currentIdx+1)/questions.length)*100 + "%";
        document.getElementById('q-count').innerText = `KASUS ${currentIdx+1} / ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options');
        container.innerHTML = "";
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(btn, i, q.c);
            container.appendChild(btn);
        });
    }

    function handleAnswer(btn, sel, cor) {
        const btns = document.querySelectorAll('#options button');
        btns.forEach(b => b.onclick = null);
        if(sel === cor) { score += (100/questions.length); btn.classList.add('correct-glow'); }
        else { btn.classList.add('wrong-glow'); btns[cor].classList.add('correct-glow'); }
        setTimeout(() => { if(++currentIdx < questions.length) showQuestion(); else finish(); }, 1000);
    }

    async function fetchGlobalRank() {
        try {
            const res = await fetch(URL, { headers: { 'X-Master-Key': API_KEY }});
            const data = await res.json();
            return data.record || [];
        } catch (e) { return []; }
    }

    async function finish() {
        showPage('result');
        const final = Math.round(score);
        document.getElementById('score-display').innerText = final;
        document.getElementById('cloud-status').innerText = "📡 Menyambungkan ke Cloud...";
        try {
            let db = await fetchGlobalRank();
            db = db.filter(u => u.name.toLowerCase() !== currentUser.toLowerCase());
            db.push({name: currentUser, score: final});
            db.sort((a,b) => b.score - a.score);
            await fetch(URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(db.slice(0, 10))
            });
            document.getElementById('cloud-status').innerText = "✅ Skor Tersimpan!";
        } catch (e) { document.getElementById('cloud-status').innerText = "❌ Gagal Simpan."; }
    }

    async function toggleRanking() {
        showPage('ranking');
        document.getElementById('rank-body').innerHTML = `<tr><td>📡 Loading...</td></tr>`;
        const db = await fetchGlobalRank();
        document.getElementById('rank-body').innerHTML = db.map((u, i) => 
            `<tr><td>${i+1}</td><td>${u.name}</td><td align="right">${u.score}</td></tr>`
        ).join('');
    }
</script>
</body>
</html>
