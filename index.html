<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="web-title">TEST PENGETAHUAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-body: #0a0a0b; --bg-card: #161618; --bg-input: #000;
            --text-main: #e3e3e3; --text-sub: #9e9e9e; --primary: #a8cdff; 
            --border: #2d2d30; --success: #34d399; --danger: #f87171; --shadow: rgba(0,0,0,0.7);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--bg-card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: var(--bg-card); z-index: 200; transition: 0.3s; padding: 40px 20px; box-shadow: 10px 0 30px var(--shadow); border-right: 1px solid var(--border); }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 5px; transition: 0.2s; text-align: left; }
        .sidebar-item:hover { background: var(--bg-input); color: var(--primary); }
        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 500px; background: var(--bg-card); padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px var(--shadow); text-align: center; border: 1px solid var(--border); }
        .hidden { display: none !important; }
        input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        button { background: var(--primary); border: none; color: #0b0f1a; padding: 15px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.2s; margin-bottom: 10px; text-transform: uppercase; }
        #options button { text-align: left; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); text-transform: none; }
        .correct-glow { background: var(--success) !important; color: white !important; box-shadow: 0 0 15px var(--success); }
        .wrong-glow { background: var(--danger) !important; color: white !important; box-shadow: 0 0 15px var(--danger); }
        .progress-bar { height: 6px; background: var(--border); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        #q-image { width: 100%; border-radius: 12px; margin-bottom: 15px; display: none; border: 1px solid var(--border); object-fit: cover; max-height: 250px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8rem; }
        td, th { padding: 10px 5px; border-bottom: 1px solid var(--border); text-align: left; }
        .adm-btn { padding: 4px 8px; font-size: 0.65rem; border-radius: 5px; border: none; cursor: pointer; margin-right: 2px; width: auto; display: inline-block; font-weight: 800; }
        .lvl-badge { background: #1a1b1f; color: var(--primary); padding: 2px 8px; border-radius: 10px; font-size: 0.6rem; margin-bottom: 10px; display: inline-block; font-weight: 900; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio> 
<audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/1110/1110-preview.mp3"></audio>

<div class="header">
    <div style="display:flex; align-items:center; gap:15px;">
        <div style="cursor:pointer; font-size:1.4rem;" onclick="toggleSidebar()">☰</div>
        <div id="header-title" style="font-weight:800; color:var(--primary); letter-spacing:1px;">TEST PENGETAHUAN</div>
    </div>
    <div id="status-tag" style="font-size: 0.6rem; font-weight: 800; color:var(--primary);">V7.0_OFFICIAL</div>
</div>

<div class="sidebar" id="sidebar">
    <h2 style="color:var(--primary)">System Menu</h2>
    <div class="sidebar-item" onclick="location.reload()">🏠 Beranda</div>
    <div class="sidebar-item" onclick="toggleRanking()">🏆 Ranking Global</div>
    <div class="sidebar-item" onclick="authAdmin()">🔒 Login Otoritas</div>
    <div class="sidebar-item" id="god-menu" style="display:none; color:var(--success)" onclick="showPage('admin-panel')">⚡ Admin Panel</div>
    <div class="sidebar-item" style="color:var(--danger); margin-top:40px;" onclick="toggleSidebar()">Tutup</div>
</div>

<div class="container">
    <div id="setup" class="card">
        <h2 style="margin-top:0">Identitas Agen</h2>
        <div id="register-box">
            <input type="text" id="username" placeholder="Masukkan Nama Kode...">
            <button onclick="checkAndRegister()">MULAI TEST</button>
        </div>
        <div id="continue-box" class="hidden">
            <p id="welcome-back" style="color:var(--primary); font-weight:600;"></p>
            <button onclick="startLevel1()">LANJUTKAN MISI</button>
        </div>
    </div>

    <div id="quiz" class="card hidden">
        <div id="lvl-tag" class="lvl-badge"></div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:10px;">
            <span id="q-count"></span>
            <span style="font-weight:bold; color:var(--primary);">PTS: <span id="live-score">0</span></span>
        </div>
        <img id="q-image" src="" alt="Lampiran">
        <div id="question-text" style="background:var(--bg-input); padding:20px; border-radius:15px; text-align:left; border-left:4px solid var(--primary); margin-bottom:20px;"></div>
        <div id="options" style="display:grid; gap:10px;"></div>
    </div>

    <div id="lvl-up" class="card hidden">
        <h2 id="up-title" style="color:var(--primary)">LEVEL CLEAR!</h2>
        <p id="up-desc"></p>
        <button id="up-btn">GAS NEXT LEVEL</button>
    </div>

    <div id="admin-panel" class="card hidden">
        <h2 style="color:var(--success)">GOD MODE CONTROL</h2>
        <button onclick="injectMe()">SUNTIK 30,000 POIN</button>
        <button style="background:var(--danger); color:white;" onclick="resetLocalStorage()">RESET DATA PERANGKAT</button>
        <button class="btn-sec" onclick="showPage('setup')">Kembali</button>
    </div>

    <div id="ranking" class="card hidden">
        <h2>Ranking Global</h2>
        <table id="rank-table">
            <thead><tr><th>#</th><th>Agen</th><th>Poin</th><th>Opsi</th></tr></thead>
            <tbody id="rank-body"></tbody>
        </table>
        <button style="margin-top:20px" onclick="showPage('setup')">Kembali</button>
    </div>

    <div id="result" class="card hidden">
        <h2>Test Selesai</h2>
        <div style="font-size:4rem; font-weight:900; color:var(--primary);" id="score-display">0</div>
        <div id="cloud-status" style="font-size:0.75rem; color:var(--success);"></div>
        <button onclick="location.reload()">MAIN LAGI</button>
    </div>
</div>

<script>
    const BIN_ID = "69c4957daa77b81da91dbc5b"; 
    const API_KEY = "$2a$10$B8fhV5n7IkR2au5rrUG1QeGxPZkLVngsNZRDWpw9x2mzDXeRCgyDG";
    const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const lv1 = [
        { q: "CEO Tewas. Pesan: 7, 10, 11. Tersangka: Jason, Mike, Kevin, Ryan.", a: ["Jason", "Mike", "Kevin", "Ryan"], c: 0 },
        { q: "Ayah saya punya anak laki-laki, tapi bukan saudara saya. Siapa?", a: ["Ayah", "Anak", "Saya"], c: 2 },
        { q: "Sandi Digital: '3 21 16 1' adalah...", a: ["BANG", "CUPA", "DUMB"], c: 1 },
        { q: "Ikan: 12 ikan, 5 tenggelam. Sisa berapa?", a: ["7", "12", "0"], c: 1 },
        { q: "Pintu Aman: Gas Sarin, Sniper, Singa lapar 1 tahun.", a: ["Gas", "Sniper", "Singa"], c: 2 }
    ];

    const lv2 = [ // GALAXY BERGAMBAR (10 SOAL)
        { q: "Apa nama galaksi spiral yang paling dekat dengan kita ini?", a: ["Andromeda", "Sombrero", "Triangulum"], c: 0, img: "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=500" },
        { q: "Objek ini memiliki gravitasi sangat kuat, cahaya pun tak bisa kabur. Apa ini?", a: ["Bintang Neutron", "Lubang Hitam", "Katai Putih"], c: 1, img: "https://images.unsplash.com/photo-1462332420958-a05d1e002413?w=500" },
        { q: "Nebula ini berbentuk seperti kepala hewan, apa namanya?", a: ["Kepala Kuda", "Kepala Elang", "Kepala Naga"], c: 0, img: "https://images.unsplash.com/photo-1614730321146-b6fa6a46bc46?w=500" },
        { q: "Planet merah ini adalah...", a: ["Venus", "Mars", "Jupiter"], c: 1, img: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=500" },
        { q: "Fenomena cahaya di kutub ini disebut?", a: ["Aurora", "Meteor", "Supernova"], c: 0, img: "https://images.unsplash.com/photo-1531366930499-81d5f21dd435?w=500" },
        { q: "Ini adalah planet terbesar di Tata Surya kita.", a: ["Saturnus", "Jupiter", "Neptunus"], c: 1, img: "https://images.unsplash.com/photo-1614732414444-096e5f1122d5?w=500" },
        { q: "Bintang yang meledak ini dinamakan?", a: ["Nebula", "Supernova", "Galaksi"], c: 1, img: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=500" },
        { q: "Satu-satunya satelit alami Bumi adalah?", a: ["Titan", "Bulan", "Europa"], c: 1, img: "https://images.unsplash.com/photo-1522030239044-12f31138451c?w=500" },
        { q: "Planet yang memiliki cincin paling megah ini adalah?", a: ["Uranus", "Saturnus", "Jupiter"], c: 1, img: "https://images.unsplash.com/photo-1614730321146-b6fa6a46bc46?w=500" },
        { q: "Pusat dari Tata Surya kita adalah?", a: ["Bumi", "Matahari", "Jupiter"], c: 1, img: "https://images.unsplash.com/photo-1529788295308-1eace6f67388?w=500" }
    ];

    const lv3 = [ // DETEKTIF ADVANCED
        { q: "Seorang pria ditemukan tewas di padang pasir dengan satu batang korek api di tangan. Mengapa?", a: ["Bunuh diri", "Kalah taruhan balon udara", "Dibakar"], c: 1 },
        { q: "Seseorang membunuh istrinya, lalu membuang pisaunya ke jurang tanpa saksi. 1 jam kemudian polisi menelepon dan menyuruhnya ke TKP. Begitu sampai, ia langsung ditangkap. Kenapa?", a: ["Ada CCTV", "Polisi tak bilang lokasi TKP", "Istrinya masih hidup"], c: 1 },
        { q: "Pintu mana yang paling aman: 1 (Singa belum makan setahun), 2 (Api abadi), 3 (Pembunuh bayaran).", a: ["Pintu 1", "Pintu 2", "Pintu 3"], c: 0 },
        { q: "Berapa banyak tanah di dalam lubang berukuran 3x3x3 meter?", a: ["27 meter kubik", "9 meter", "Tidak ada"], c: 2 },
        { q: "Jika kau berlari dan menyalip orang di posisi kedua, kau di posisi berapa?", a: ["Pertama", "Kedua", "Ketiga"], c: 1 }
    ];

    const lv4 = [ // GALAXY THEORY
        { q: "Teori ledakan dahsyat pembentuk alam semesta disebut?", a: ["Big Bang", "Steady State", "Nebula"], c: 0 },
        { q: "Unit jarak yang digunakan untuk antar bintang adalah...", a: ["Kilometer", "Tahun Cahaya", "Mil"], c: 1 },
        { q: "Apa galaksi tempat Bumi berada?", a: ["Bimasakti", "Andromeda", "Sombrero"], c: 0 },
        { q: "Berapa planet dalam Tata Surya kita?", a: ["7", "8", "9"], c: 1 },
        { q: "Matahari termasuk dalam jenis bintang apa?", a: ["Katai Kuning", "Raksasa Merah", "Katai Putih"], c: 0 }
    ];

    const lv5 = [ // FINAL MASTER
        { q: "Sandi Morse '... --- ...' artinya?", a: ["DEAD", "HELP", "SOS"], c: 2 },
        { q: "Siapa astronot pertama yang menginjakkan kaki di bulan?", a: ["Yuri Gagarin", "Neil Armstrong", "Elon Musk"], c: 1 },
        { q: "Warna bintang yang paling panas adalah?", a: ["Merah", "Kuning", "Biru"], c: 2 },
        { q: "Kasus: 1+4=5, 2+5=12, 3+6=21, 8+11=?", a: ["96", "40", "52"], c: 0 },
        { q: "Apa senjata rahasia detektif paling mematikan?", a: ["Pistol", "Logika", "Koneksi"], c: 1 }
    ];

    let currentIdx = 0, score = 0, currentUser = "", currentLv = 1, isAdmin = false;

    window.onload = () => {
        const savedName = localStorage.getItem('agent_name');
        if(savedName) {
            currentUser = savedName;
            document.getElementById('register-box').classList.add('hidden');
            document.getElementById('continue-box').classList.remove('hidden');
            document.getElementById('welcome-back').innerText = `Siap, Agen ${savedName}?`;
            updateHeaderTitle(savedName);
        }
    };

    function updateHeaderTitle(name) {
        document.getElementById('header-title').innerText = `AGEN: ${name.toUpperCase()}`;
    }

    function checkAndRegister() {
        const name = document.getElementById('username').value.trim();
        if(name.length < 3) return alert("Min 3 huruf!");
        currentUser = name;
        localStorage.setItem('agent_name', name);
        updateHeaderTitle(name);
        startLevel1();
    }

    function startLevel1() { currentIdx = 0; score = 0; currentLv = 1; showPage('quiz'); loadLvl(); }
    function startNext() { currentIdx = 0; currentLv++; showPage('quiz'); loadLvl(); }

    function loadLvl() {
        const tags = ["", "LV 1: FORENSIK", "LV 2: GALAXY VISUAL", "LV 3: DETEKTIF LOGIC", "LV 4: SPACE KNOWLEDGE", "LV 5: FINAL MASTER"];
        document.getElementById('lvl-tag').innerText = tags[currentLv];
        showQuestion();
    }

    function getActiveList() {
        if(currentLv === 1) return lv1;
        if(currentLv === 2) return lv2;
        if(currentLv === 3) return lv3;
        if(currentLv === 4) return lv4;
        return lv5;
    }

    function showQuestion() {
        const list = getActiveList();
        const q = list[currentIdx];
        const imgEl = document.getElementById('q-image');
        
        if(q.img) { imgEl.src = q.img; imgEl.style.display = 'block'; }
        else { imgEl.style.display = 'none'; }

        document.getElementById('progress-fill').style.width = ((currentIdx+1)/list.length)*100 + "%";
        document.getElementById('q-count').innerText = `${currentIdx+1} / ${list.length}`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options'); container.innerHTML = "";
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt; btn.onclick = () => handleAnswer(btn, i, q.c);
            container.appendChild(btn);
        });
    }

    function handleAnswer(btn, sel, cor) {
        const btns = document.querySelectorAll('#options button');
        btns.forEach(b => b.onclick = null);
        const pts = 100; 
        if(sel === cor) {
            score += pts; btn.classList.add('correct-glow'); document.getElementById('snd-correct').play();
        } else {
            btn.classList.add('wrong-glow'); btns[cor].classList.add('correct-glow'); document.getElementById('snd-wrong').play();
        }
        document.getElementById('live-score').innerText = score;
        setTimeout(() => {
            const list = getActiveList();
            if(++currentIdx < list.length) showQuestion();
            else if(currentLv < 5) levelUpSequence();
            else finish();
        }, 1000);
    }

    function levelUpSequence() {
        showPage('lvl-up');
        document.getElementById('up-title').innerText = `LEVEL ${currentLv} SELESAI!`;
        document.getElementById('up-desc').innerText = `Poin saat ini: ${score}. Siap ke tantangan berikutnya?`;
        document.getElementById('up-btn').onclick = startNext;
    }

    // --- CLOUD & ADMIN ---
    function authAdmin() {
        if(prompt("Kode Rahasia:") === "2377") {
            isAdmin = true;
            document.getElementById('status-tag').innerText = "GOD_MODE_ACTIVE";
            document.getElementById('god-menu').style.display = 'block';
            alert("Akses Penuh Diterima!");
        }
    }

    async function editScore(name) {
        if(!isAdmin) return;
        const s = prompt(`Poin baru ${name}:`);
        if(!s) return;
        let db = await fetchGlobalRank();
        const idx = db.findIndex(u => u.name === name);
        if(idx !== -1) { db[idx].score = parseInt(s); await saveToCloud(db); toggleRanking(); }
    }

    async function kickAgent(name) {
        if(!isAdmin || !confirm(`Kick ${name}?`)) return;
        let db = await fetchGlobalRank();
        db = db.filter(u => u.name !== name);
        await saveToCloud(db); toggleRanking();
    }

    async function saveToCloud(data) {
        data.sort((a,b) => b.score - a.score);
        await fetch(URL, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(data.slice(0, 25))
        });
    }

    async function fetchGlobalRank() {
        const res = await fetch(URL, { headers: { 'X-Master-Key': API_KEY }});
        const data = await res.json(); return data.record || [];
    }

    async function toggleRanking() {
        showPage('ranking');
        document.getElementById('rank-body').innerHTML = `<tr><td colspan="4">Syncing...</td></tr>`;
        const db = await fetchGlobalRank();
        document.getElementById('rank-body').innerHTML = db.map((u, i) => 
            `<tr>
                <td>${i+1}</td>
                <td>${u.name}</td>
                <td>${u.score}</td>
                <td>${isAdmin ? `
                    <button class="adm-btn" style="background:var(--success); color:#000" onclick="editScore('${u.name}')">ED</button>
                    <button class="adm-btn" style="background:var(--danger); color:#fff" onclick="kickAgent('${u.name}')">X</button>
                ` : '-'}</td>
            </tr>`
        ).join('');
    }

    function showPage(id) {
        document.getElementById('sidebar').classList.remove('active');
        ['setup', 'quiz', 'lvl-up', 'ranking', 'result', 'admin-panel'].forEach(p => document.getElementById(p)?.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function injectMe() { score = 30000; alert("Suntik berhasil!"); }
    function resetLocalStorage() { localStorage.clear(); location.reload(); }

    async function finish() {
        showPage('result');
        document.getElementById('score-display').innerText = score;
        document.getElementById('cloud-status').innerText = "Uploading to Cloud...";
        let db = await fetchGlobalRank();
        db = db.filter(u => u.name.toLowerCase() !== currentUser.toLowerCase());
        db.push({name: currentUser, score: score});
        await saveToCloud(db);
        document.getElementById('cloud-status').innerText = "✅ Data Tersimpan!";
    }
</script>
</body>
</html>
