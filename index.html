<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Mastery: Ultimate Admin Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f8fafc; --accent: #fbbf24; --danger: #f43f5e; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        .hidden { display: none; }
        input { background: #334155; border: 2px solid #475569; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; }
        button { background: var(--primary); border: none; color: #0f172a; padding: 14px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; margin-bottom: 8px; transition: 0.2s; font-size: 0.9rem; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-admin { background: var(--accent); color: #0f172a; }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-danger { background: var(--danger); color: white; padding: 5px 10px; width: auto; font-size: 0.7rem; border-radius: 5px; border: none; }
        .case-box { background: rgba(15, 23, 42, 0.6); padding: 20px; border-radius: 16px; text-align: left; border-left: 4px solid var(--primary); margin-bottom: 20px; }
        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; background: #0f172a; border-radius: 10px; overflow: hidden; }
        .ranking-table td, .ranking-table th { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        .progress-bar { height: 6px; background: #334155; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        footer { margin-top: 25px; font-size: 0.7rem; color: #64748b; border-top: 1px solid #334155; padding-top: 15px; }
    </style>
</head>
<body>

<audio id="bg-music" loop><source src="SpotiDown.App - double take - Dhruv.mp3" type="audio/mpeg"></audio>
<audio id="sfx-correct"><source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg"></audio>
<audio id="sfx-wrong"><source src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" type="audio/mpeg"></audio>

<div class="container">
    <div id="setup">
        <h1 style="color:var(--primary)">Criminal IQ Test</h1>
        <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 20px;">Max Skor: 1000 | 1 User 1 Nama | 1 Hari 1 Kali</p>
        
        <div id="user-inputs">
            <input type="text" id="username" placeholder="Nama Agen Baru...">
            <button onclick="checkAndStart()">MULAI TEST</button>
        </div>

        <div id="admin-login" class="hidden" style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px;">
            <input type="password" id="adminCode" placeholder="Masukkan Kode Admin...">
            <button class="btn-admin" onclick="accessAdmin()">LOGIN ADMIN</button>
        </div>

        <button class="btn-outline" onclick="toggleRanking('menu-ranking-list', 'menu-ranking-body')">RANKING GLOBAL</button>
        <button style="background:transparent; color:#475569; font-size:0.7rem;" onclick="showAdminSection()">Akses Panel Admin</button>
        
        <div id="menu-ranking-list" class="hidden">
            <table class="ranking-table">
                <thead><tr><th>#</th><th>Agen</th><th>Title</th><th>Skor</th></tr></thead>
                <tbody id="menu-ranking-body"></tbody>
            </table>
        </div>
    </div>

    <div id="adminPanel" class="hidden">
        <h2 style="color:var(--accent)">Admin Control Center</h2>
        <div class="case-box">
            <p style="margin:0 0 10px 0;">Skor Admin Yacin (Mutlak): 1000</p>
            <button class="btn-admin" onclick="setAdminMax()">SET SKOR ADMIN KE 1000</button>
        </div>
        <div id="admin-user-list" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px;"></div>
        <button class="btn-outline" onclick="location.reload()">KELUAR ADMIN</button>
    </div>

    <div id="quiz" class="hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div id="q-count" style="font-size:0.75rem; color:var(--primary); font-weight:bold; margin-bottom:5px; text-align:left;"></div>
        <div class="case-box" id="question-text"></div>
        <div id="options-container"></div>
    </div>

    <div id="result" class="hidden">
        <h1>Hasil Investigasi</h1>
        <div style="font-size: 4.5rem; font-weight: 800; color: var(--primary);" id="score-display">0</div>
        <div class="case-box" style="border-left-color: var(--accent);">
            <p id="motivation" style="font-style: italic; font-size: 0.9rem; color: #cbd5e1; margin:0;"></p>
        </div>
        <button class="btn-outline" onclick="location.reload()">KEMBALI KE MENU</button>
        <footer>Developed with logic by <b>Yacin</b></footer>
    </div>
</div>

<script>
    const questions = [];
    for(let i=1; i<=35; i++) {
        questions.push({ 
            q: `Kasus Forensik #${i}: Analisis bukti digital menunjukkan IP pelakunya statis. Jika tersangka menggunakan VPN, apakah jejaknya tetap bisa dilacak?`, 
            a: ["Bisa", "Tidak Mungkin", "Hanya oleh Admin"], c: 0 
        });
    }

    let currentIdx = 0, score = 0, currentUser = "";
    const titles = ["Grandmaster Detective 🏆", "Elite Investigator 🔍", "Senior Profiler 🕵️", "Special Agent 🕶️", "Detective Rookie 👮"];

    function showAdminSection() { document.getElementById('admin-login').classList.toggle('hidden'); }

    function accessAdmin() {
        const code = document.getElementById('adminCode').value;
        if(code === '6723') {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            renderAdminUserList();
        } else {
            alert("Kode Salah!");
        }
    }

    function checkAndStart() {
        const name = document.getElementById('username').value.trim();
        if(!name) return alert("Masukkan Nama!");
        if(name.toLowerCase() === "admin") return alert("Nama 'Admin' hanya untuk pengelola!");

        let db = JSON.parse(localStorage.getItem('iq_db_v3')) || [];
        
        // Cek apakah nama sudah ada (1 User 1 Nama)
        const existingUser = db.find(u => u.name.toLowerCase() === name.toLowerCase());
        if(existingUser) {
            // Cek Waktu (1 Hari 1 Kali)
            const now = new Date().getTime();
            const lastTime = existingUser.timestamp || 0;
            const oneDay = 24 * 60 * 60 * 1000;

            if(now - lastTime < oneDay) {
                const remaining = Math.ceil((oneDay - (now - lastTime)) / (60 * 60 * 1000));
                return alert(`Nama "${name}" sudah digunakan. Silakan coba lagi dalam ${remaining} jam.`);
            }
        }

        currentUser = name;
        document.getElementById('bg-music').play().catch(()=>{});
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('progress-fill').style.width = (currentIdx/35)*100 + "%";
        document.getElementById('q-count').innerText = `KASUS ${currentIdx+1} / 35`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "btn-outline"; btn.style.textAlign = "left"; btn.innerText = opt;
            btn.onclick = () => {
                // Bobot soal agar max skor 1000
                let point = 1000 / 35;
                if(i === q.c) { score += point; document.getElementById('sfx-correct').play(); }
                else { document.getElementById('sfx-wrong').play(); }
                currentIdx++;
                if(currentIdx < 35) showQuestion(); else finish();
            };
            container.appendChild(btn);
        });
    }

    function finish() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        let finalScore = Math.round(score);
        document.getElementById('score-display').innerText = finalScore;
        document.getElementById('motivation').innerText = "Agen " + currentUser + ", hasil ini akan dicatat dalam database global.";
        saveScore(currentUser, finalScore);
    }

    function saveScore(name, val) {
        let db = JSON.parse(localStorage.getItem('iq_db_v3')) || [];
        db = db.filter(u => u.name.toLowerCase() !== name.toLowerCase());
        db.push({ name: name, score: val, timestamp: new Date().getTime() });
        db.sort((a, b) => b.score - a.score);
        localStorage.setItem('iq_db_v3', JSON.stringify(db));
    }

    function toggleRanking(listId, bodyId) {
        const list = document.getElementById(listId);
        list.classList.toggle('hidden');
        const db = JSON.parse(localStorage.getItem('iq_db_v3')) || [];
        const body = document.getElementById(bodyId);
        body.innerHTML = "";
        db.forEach((u, i) => {
            let t = i < 5 ? titles[i] : "Agent";
            body.innerHTML += `<tr><td>${i+1}</td><td>${u.name}</td><td>${t}</td><td>${u.score}</td></tr>`;
        });
    }

    // ADMIN CONTROLS
    function setAdminMax() {
        saveScore("Admin Yacin", 1000);
        alert("Skor Admin Yacin diset ke 1000!");
        renderAdminUserList();
    }

    function renderAdminUserList() {
        const db = JSON.parse(localStorage.getItem('iq_db_v3')) || [];
        const container = document.getElementById('admin-user-list');
        container.innerHTML = "<p style='text-align:left; font-size:0.8rem; color:var(--primary);'>DAFTAR DATABASE:</p>";
        db.forEach((u) => {
            container.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; background:#334155; padding:10px; margin-bottom:5px; border-radius:8px;">
                <span style="font-size:0.8rem;">${u.name} (Skor: ${u.score})</span>
                <button class="btn-danger" onclick="deleteUser('${u.name}')">HAPUS</button>
            </div>`;
        });
    }

    function deleteUser(name) {
        if(confirm(`Hapus agen ${name}?`)) {
            let db = JSON.parse(localStorage.getItem('iq_db_v3')) || [];
            db = db.filter(u => u.name !== name);
            localStorage.setItem('iq_db_v3', JSON.stringify(db));
            renderAdminUserList();
        }
    }
</script>
</body>
</html>
