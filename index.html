<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite IQ v5.0: Criminal Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0a0a0b; --card: #141416; --primary: #00ff88; --danger: #ff4b2b;
            --text: #e0e0e0; --accent: #1e293b; --border: #27272a;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Booting Animation */
        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'JetBrains Mono', monospace; color: var(--primary); }
        .typing { overflow: hidden; white-space: nowrap; border-right: 2px solid var(--primary); animation: typing 2s steps(30, end), blink .5s step-end infinite; width: fit-content; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--primary) } }

        .card { width: 90%; max-width: 500px; background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--primary), #00ddeb); }

        /* Timer Bar */
        .timer-container { width: 100%; height: 4px; background: #222; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--primary); transition: 0.1s linear; }

        /* Button Savage */
        button { background: var(--primary); border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; font-family: 'Inter'; text-transform: uppercase; letter-spacing: 1px; color: #000; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 255, 136, 0.3); }
        
        #options button { background: var(--accent); color: #fff; border: 1px solid var(--border); text-align: left; }
        #options button:hover { border-color: var(--primary); background: #1e293b; }

        .hidden { display: none; }
        .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(10, 10, 11, 0.8); backdrop-filter: blur(10px); sticky top: 0; }
    </style>
</head>
<body>

<div id="boot-screen">
    <div class="typing">CONNECTING TO GLOBAL INTERPOL...</div>
    <div id="boot-status" style="font-size: 0.7rem; margin-top: 10px; opacity: 0.6;">[SATELLITE SYNC: 0%]</div>
</div>

<div class="header">
    <div style="font-weight: 900; color: var(--primary); font-size: 1.2rem;">ELITE IQ <span style="font-weight: 300; color:#fff;">v5.0</span></div>
    <div id="user-display" style="font-size: 0.7rem; color: #71717a;">GUEST_MODE</div>
</div>

<div id="main-container" style="display:flex; align-items:center; justify-content:center; min-height: 80vh;" class="hidden">
    
    <div id="page-setup" class="card">
        <h2 style="margin:0;">OTORITAS AGEN</h2>
        <p style="color:#71717a; font-size: 0.8rem; margin-bottom: 25px;">Sinkronisasi sidik jari digital untuk akses berkas kasus.</p>
        <input type="text" id="agent-name" placeholder="NAMA KODE AGEN..." style="width:100%; background:#0a0a0b; border:1px solid var(--border); padding:15px; border-radius:10px; color:#fff; margin-bottom:15px; outline:none;">
        <button onclick="login()">DAFTARKAN IDENTITAS</button>
    </div>

    <div id="page-quiz" class="card hidden">
        <div style="display:flex; justify-content:space-between; font-size: 0.7rem; font-weight: bold;">
            <span id="case-num">KASUS 01</span>
            <span style="color:var(--primary)">SCORE: <span id="current-score">0</span></span>
        </div>
        <div class="timer-container"><div id="timer-fill"></div></div>
        
        <div style="background:#0a0a0b; padding:20px; border-radius:15px; margin: 20px 0; border-left: 4px solid var(--primary); font-size: 0.95rem; line-height: 1.5;" id="question-box">
            Memuat Berkas Kasus...
        </div>
        <div id="options" style="display:grid; gap:10px;"></div>
    </div>

    <div id="page-result" class="card hidden" style="text-align:center;">
        <h3 style="color:var(--primary)">HASIL INVESTIGASI</h3>
        <div id="final-score" style="font-size: 4rem; font-weight: 900; margin: 10px 0;">0</div>
        <div id="rank-title" style="font-weight: bold; margin-bottom: 5px;">TRAINEE</div>
        <p id="rank-desc" style="font-size: 0.8rem; color:#71717a; margin-bottom: 25px;"></p>
        <button onclick="location.reload()">RE-INITIALIZE ACCESS</button>
    </div>

</div>

<script>
    // Konfigurasi Cloud
    const BIN_ID = "69c4957daa77b81da91dbc5b"; 
    const API_KEY = "$2a$10$B8fhV5n7IkR2au5rrUG1QeGxPZkLVngsNZRDWpw9x2mzDXeRCgyDG";
    const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const cases = [
        { q: "CEO Tewas. Pesan darah: 7, 10, 11. Tersangka: Jason, Mike, Kevin, Ryan.", a: ["Jason", "Mike", "Kevin", "Ryan"], c: 0, d: "Bulan 7(July), 10(Oct), 11(Nov). Inisial J-O-N." },
        { q: "Sandi Caesar: 'DETEKTIF' -> 'EFUFLUJG'. Sandi 'IQ'?", a: ["JR", "KP", "JS", "KR"], c: 0, d: "Geser 1 huruf ke depan (A->B)." },
        { q: "Jam Digital: Mati di 13:07. Pelakunya?", a: ["Leo", "Heli", "Shella", "Sam"], c: 0, d: "1307 diputar 180 derajat kebaca 'LEO'." }
        // Tambahkan soal lainnya di sini...
    ];

    let current = 0, score = 0, agent = "", timer, timeLeft;

    // Booting Logic
    window.onload = () => {
        let p = 0;
        const interval = setInterval(() => {
            p += 5;
            document.getElementById('boot-status').innerText = `[SATELLITE SYNC: ${p}%]`;
            if(p >= 100) {
                clearInterval(interval);
                document.getElementById('boot-screen').classList.add('hidden');
                document.getElementById('main-container').classList.remove('hidden');
            }
        }, 100);
    };

    function login() {
        const name = document.getElementById('agent-name').value;
        if(name.length < 3) return alert("Akses Ditolak: Nama terlalu pendek!");
        agent = name;
        document.getElementById('user-display').innerText = `AGENT: ${agent.toUpperCase()}`;
        startQuiz();
    }

    function startQuiz() {
        showPage('page-quiz');
        loadQuestion();
    }

    function loadQuestion() {
        if(current >= cases.length) return finish();
        
        const q = cases[current];
        document.getElementById('case-num').innerText = `KASUS ${current + 1}`;
        document.getElementById('question-box').innerText = q.q;
        
        const optCont = document.getElementById('options');
        optCont.innerHTML = "";
        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.innerText = opt;
            b.onclick = () => check(i);
            optCont.appendChild(b);
        });

        startTimer();
    }

    function startTimer() {
        timeLeft = 100;
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft -= 0.5;
            document.getElementById('timer-fill').style.width = timeLeft + "%";
            if(timeLeft <= 0) {
                clearInterval(timer);
                check(-1); // Time out
            }
        }, 50);
    }

    function check(idx) {
        clearInterval(timer);
        const correct = cases[current].c;
        if(idx === correct) {
            score += Math.round(timeLeft * 2); // Poin berdasarkan sisa waktu
            document.getElementById('current-score').innerText = score;
        }
        current++;
        setTimeout(loadQuestion, 500);
    }

    function showPage(id) {
        ['page-setup', 'page-quiz', 'page-result'].forEach(p => document.getElementById(p).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function finish() {
        showPage('page-result');
        document.getElementById('final-score').innerText = score;
        let title = "RECRUIT";
        if(score > 500) title = "ELITE AGENT";
        if(score > 1000) title = "FORENSIC MASTERMIND";
        document.getElementById('rank-title').innerText = title;
        document.getElementById('rank-desc').innerText = `Laporan investigasi agen ${agent} telah diarsipkan ke Cloud Global.`;
    }
</script>

</body>
</html>
