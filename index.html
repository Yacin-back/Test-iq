<script>
    // ==========================================
    // DATA DATABASE CLOUD KAMU (SUDAH TERPASANG)
    // ==========================================
    const BIN_ID = "69c4957daa77b81da91dbc5b"; 
    const API_KEY = "$2a$10$B8fhV5n7IkR2au5rrUG1QeGxPZkLVngsNZRDWpw9x2mzDXeRCgyDG";
    const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const questions = [
        { q: "Kasus CEO: Tewas di ruang kerja, pesan kalender berdarah: 7, 10, 11. Tersangka: Jason, Mike, Kevin, Ryan.", a: ["Jason", "Mike", "Kevin", "Ryan"], c: 0 },
        { q: "Sandi Digital TKP: '3 21 16 1'. Jika dikonversi ke alfabet, menunjuk nama?", a: ["B-A-N-G", "C-U-P-A", "D-U-M-B", "C-A-P-A"], c: 1 },
        { q: "Analisis TKP: Jendela pecah dari luar, tapi serpihan kaca ada di luar gedung. Kesimpulan?", a: ["Pelaku jujur", "Pecah dari dalam", "Ada dua pelaku", "Suhu udara"], c: 1 },
        { q: "Pola Brankas: 2, 6, 12, 20, 30, ...?", a: ["40", "42", "44", "50"], c: 1 },
        { q: "Pesan Biner: '10101' di tangan korban. Siapa pelakunya?", a: ["21", "20", "19", "18"], c: 0 },
        { q: "Logika Rantai: Jika 1=5, 2=15, 3=215, 4=3215, maka 5 sama dengan?", a: ["43215", "1", "5", "555"], c: 1 },
        { q: "Tiga Pintu: Pintu A (Gas Sarin), Pintu B (Sniper), Pintu C (Singa lapar 1 tahun). Mana yang aman?", a: ["Pintu A", "Pintu B", "Pintu C", "Semua Mati"], c: 2 },
        { q: "Sandi Caesar: 'DETEKTIF' -> 'EFUFLUJG'. Apa sandi untuk 'IQ'?", a: ["JR", "KP", "JS", "KR"], c: 0 },
        { q: "Jejak Salju: Datang dari utara, tapi tidak ada jejak kembali. Penjelasan?", a: ["Terbang", "Jalan Mundur", "Pakai Egrang", "Salju Baru"], c: 1 },
        { q: "Jam Digital: Mati di angka 13:07. Siapa pelakunya?", a: ["Leo", "Heli", "Shella", "Sam"], c: 0 },
        { q: "Logika Ruang: Apa yang bisa mengisi seluruh ruangan tapi tidak memakan tempat?", a: ["Udara", "Cahaya", "Suara", "Kenangan"], c: 1 },
        { q: "Foto: 'Pria di foto ini adalah anak dari ayah saya'. Siapa pria itu?", a: ["Dirinya sendiri", "Anaknya", "Ayahnya", "Keponakan"], c: 1 },
        { q: "Angka: Berapa kali angka 7 muncul dalam deret angka 1 sampai 100?", a: ["10", "11", "20", "21"], c: 2 },
        { q: "Ikan: 12 ikan di akuarium, 5 tenggelam. Sisa berapa?", a: ["7", "12", "0", "5"], c: 1 },
        { q: "Pria menembak istrinya, mencuci fotonya, lalu makan malam bersama. Dia adalah?", a: ["Hantu", "Fotografer", "Mimpi", "Kembar"], c: 1 }
    ];

    let currentIdx = 0, score = 0, currentUser = "";

    window.onload = () => {
        const saved = localStorage.getItem('agent_v33');
        if(saved) {
            currentUser = saved;
            document.getElementById('logged-name').innerText = "Agen: " + currentUser;
            document.getElementById('welcome-user').classList.remove('hidden');
            document.getElementById('new-user').classList.add('hidden');
        }
    };

    function showPage(id) {
        document.getElementById('sidebar').classList.remove('active');
        ['setup', 'about', 'ranking', 'quiz', 'result'].forEach(p => {
            const el = document.getElementById(p);
            if(el) el.classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    function checkAndRegister() {
        const name = document.getElementById('username').value.trim();
        if(name.length < 3) return alert("Nama minimal 3 huruf!");
        currentUser = name;
        localStorage.setItem('agent_v33', name);
        startQuiz();
    }

    function startQuiz() { currentIdx = 0; score = 0; showPage('quiz'); showQuestion(); }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('progress-fill').style.width = ((currentIdx+1)/15)*100 + "%";
        document.getElementById('q-count').innerText = `KASUS ${currentIdx+1} / 15`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options');
        container.innerHTML = "";
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(btn, i, q.c);
            container.appendChild(btn);
        });
    }

    function handleAnswer(btn, sel, cor) {
        const btns = document.querySelectorAll('#options button');
        btns.forEach(b => b.onclick = null);
        if(sel === cor) {
            score += (500/15);
            btn.classList.add('correct-glow');
        } else {
            btn.classList.add('wrong-glow');
            btns[cor].classList.add('correct-glow');
        }
        document.getElementById('live-score').innerText = Math.floor(score);
        setTimeout(() => { if(++currentIdx < 15) showQuestion(); else finish(); }, 1200);
    }

    function getTitel(s) {
        if(s >= 450) return "BOSS";
        if(s >= 300) return "SENIOR";
        if(s >= 150) return "JUNIOR";
        return "TRAINEE";
    }

    // --- FUNGSI CLOUD ---
    async function fetchGlobalRank() {
        try {
            const res = await fetch(URL, { headers: { 'X-Master-Key': API_KEY }});
            const data = await res.json();
            return data.record || [];
        } catch (e) { return []; }
    }

    async function finish() {
        showPage('result');
        const final = Math.round(score);
        const titel = getTitel(final);
        document.getElementById('score-display').innerText = final;
        document.getElementById('msg').innerText = "Titel Anda: " + titel;
        document.getElementById('cloud-status').innerText = "📡 Mengirim data ke Satelit Cloud...";
        
        try {
            let currentData = await fetchGlobalRank();
            currentData = currentData.filter(u => u.name.toLowerCase() !== currentUser.toLowerCase());
            currentData.push({ name: currentUser, score: final, titel: titel });
            currentData.sort((a, b) => b.score - a.score);
            
            await fetch(URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(currentData.slice(0, 10))
            });
            document.getElementById('cloud-status').innerText = "✅ Skor Tersimpan di Ranking Global!";
        } catch (err) {
            document.getElementById('cloud-status').innerText = "❌ Gagal Sinkronisasi Cloud.";
        }
    }

    async function toggleRanking() {
        showPage('ranking');
        document.getElementById('rank-body').innerHTML = `<tr><td colspan="3" align="center">Menghubungkan ke Satelit...</td></tr>`;
        const db = await fetchGlobalRank();
        if(db.length === 0) {
            document.getElementById('rank-body').innerHTML = `<tr><td colspan="3" align="center">Belum ada data di server.</td></tr>`;
        } else {
            document.getElementById('rank-body').innerHTML = db.map((u, i) => 
                `<tr><td>${i+1}</td><td>${u.name} <span class="titel-tag">${u.titel}</span></td><td align="right">${u.score}</td></tr>`
            ).join('');
        }
    }
</script>
